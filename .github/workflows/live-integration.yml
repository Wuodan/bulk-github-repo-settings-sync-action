name: Live Integration

on:
  workflow_dispatch:
    inputs:
      skip-reset:
        description: 'Skip resetting the fixed live test repositories before running the integration test'
        required: false
        default: false
        type: boolean

jobs:
  live-integration:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Reset live test repositories
        if: ${{ !inputs['skip-reset'] }}
        env:
          INTEGRATION_GH_TOKEN: ${{ secrets.TEST_GH_TOKEN }}
          INTEGRATION_API_URL: ${{ github.api_url }}
        run: node scripts/integration/reset-live-test-state.js

      - name: Run action against live test repositories
        id: live-sync
        uses: ./
        with:
          github-token: ${{ secrets.TEST_GH_TOKEN }}
          github-api-url: ${{ github.api_url }}
          repositories-file: ./sample-configuration/integration-test/repos.yml

      - name: Assert live integration results
        env:
          INTEGRATION_GH_TOKEN: ${{ secrets.TEST_GH_TOKEN }}
          INTEGRATION_API_URL: ${{ github.api_url }}
          ACTION_UPDATED_REPOSITORIES: ${{ steps.live-sync.outputs['updated-repositories'] }}
          ACTION_CHANGED_REPOSITORIES: ${{ steps.live-sync.outputs['changed-repositories'] }}
          ACTION_UNCHANGED_REPOSITORIES: ${{ steps.live-sync.outputs['unchanged-repositories'] }}
          ACTION_FAILED_REPOSITORIES: ${{ steps.live-sync.outputs['failed-repositories'] }}
          ACTION_WARNING_REPOSITORIES: ${{ steps.live-sync.outputs['warning-repositories'] }}
          ACTION_RESULTS: ${{ steps.live-sync.outputs['results'] }}
        run: node scripts/integration/assert-live-test-state.js
