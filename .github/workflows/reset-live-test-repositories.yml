name: Reset Live Test Repositories

on:
  workflow_dispatch:

jobs:
  reset-live-test-repositories:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Reset live test repositories
        env:
          INTEGRATION_GH_TOKEN: ${{ secrets.TEST_GH_TOKEN }}
          INTEGRATION_API_URL: ${{ github.api_url }}
        run: node scripts/integration/reset-live-test-state.js
